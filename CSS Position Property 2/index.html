<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Position Property</title>
    <style>
        *{
            padding: 0;
            margin: 0;
        }
        .box{
            border: 2px solid black;
            width: 80vh;
            height: 123px;
            padding: 2px;
        }
        .box1{
            background-color: aqua;
            position: absolute;
            top: 0px;
            left: 0px;
            position:sticky
        }
        .box2{
            background-color: azure;
            position: relative;
            top: 31px;
            left: 35px;
            
        }
        .box3{
            background-color: blue;
            position: fixed;
            bottom: 0px;
            left: 25vw;
        }
        .box4{
            background-color: green;
        }
        .parents{
            padding:43px;
            margin: 34px;
            border: 3px solid black;
            position: absolute;
        }

    </style>
</head>
<body>
    <div class="parents">
    <div class="box box1"></div>
    <div class="box box2"></div>
    <div class="box box3"></div>
    <div class="box box4"></div>
    </div>
</body>
</html>
