<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Child Selector</title>
    <style>  /*Child Selector*/
        div>p{
            background-color: aqua;
            color: green;
        }
    </style>
</head>
<body>
    <div>
        hi  i am sudeep.
        <p>i am para inside the div</p>
    </div>
</body>
</html>
