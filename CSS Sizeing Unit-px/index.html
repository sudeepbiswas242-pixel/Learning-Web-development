<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Sizeing Unit- px</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    div{
        /*// px = pixels, a unit used for screen/display size*/
        box-sizing: border-box;
        border: 2px solid black;
        width: 324px;
        background-color: aqua;
    }
</style>

<body>
    <div>
        Lorem ipsum dolor sit amet, consectetur adipisicing elit. Dignissimos laudantium possimus odit cupiditate iste
        nesciunt enim, blanditiis exercitationem ducimus sint, recusandae voluptatem accusantium ex sapiente
        necessitatibus! Quo a maiores unde?
    </div>
</body>

</html>
