<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>selector css</title>
    <style>/*pseudo selector*/
       a:visited {
        color: yellow;
       }
       a:link{
        color: green;
       }
       a:active{
        background-color: aqua;
       }
       a:hover{
        background-color: red;
       }
       p:first-child{
        background-color: blue;
       }
    </style>
</head>
<body><main class="one">
    <p>i am first child</p>
    <p>i am second child</p>
</main>
    <div>
    <a href="https://google.com">open google</a>
    <a href="https://facebook.com">open facebook</a>
    </div>
</body>
</html>
