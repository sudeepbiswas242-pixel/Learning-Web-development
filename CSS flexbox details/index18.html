<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Use row gap property </title>
    <style>
        .container {
            border: 2px solid red;
            display: flex;
            height: 80vh;
            align-items:center ;
            flex-wrap: wrap;
            align-content: flex-start;
            flex-flow:row row-reverse;
           row-gap: 30px;
        }

        .item {
            height: 65px;
            width: 65px;
            border: 2px solid black;
            background-color: blueviolet;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
        <div class="item"></div>
    </div>
</body>

</html>
