<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Outline</title>
    <style>
.Outline{
    outline: 2px solid #000000;
    outline-offset: 46px;
    border: 2px solid #07cc3f;
    border-radius: 35px;
}
    </style>
</head>

<body>
    <p class="Outline">
        Lorem ipsum dolor sit amet consectetur adipisicing elit. Fuga, error in quisquam ipsa illo ipsum consectetur
        voluptatum nihil voluptatem aliquam qui, amet soluta, natus cupiditate quos. Culpa molestias reiciendis eaque!
    </p>
</body>

</html>
