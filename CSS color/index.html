<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>color</title>
    <style>
        h1{
            color: aqua;
        }
        h2{
            color:#FFFF00 ;
        }
        h3{
            color: rgb(49, 201, 15);
        }
        h4{
            color: rgba(166, 30, 98, 0.751);
        }
        li{
            color: hsl(200, 200%, 50%);
        }
    </style>
</head>
<body>
    <div>
        <h1>learn about color</h1>
        <h2>hex color code</h2>
        <h3>rgb</h3>
        <h4>rgbA</h4>
        <li>hsl</li>
    </div>
    
</body>
</html>
